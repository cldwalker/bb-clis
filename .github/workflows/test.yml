name: Tests
on: push
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install babashka
        uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          bb: 1.12.218
      - name: Install bbin
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o "$HOME/.local/bin/bbin" https://raw.githubusercontent.com/babashka/bbin/v0.2.5/bbin
          chmod +x "$HOME/.local/bin/bbin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install project CLIs via bbin
        run: bb bbin:install bb-replace bb-table
      - name: Run bb tests
        run: bb test
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 25

      - name: Install clojure
        uses: DeLaGuardo/setup-clojure@master
        with:
          cli: 1.11.1.1165

      - run: clojure -M:clj-kondo --lint src test
  custom-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install babashka
        uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          bb: 1.12.218
      # TODO: Re-enable or replace with carve that has better support for bb.edn usage or ignoring a regex of ns
      # - name: Check for unused vars
      #   run: bin/bb-unused-vars -i .github/workflows/unused-vars-to-ignore.edn  src
      - run: bb --config dev-bb.edn lint:large-vars
      - run: bb --config dev-bb.edn lint:ns-docstrings
      - run: bb --config dev-bb.edn lint:minimize-public-vars

      # TODO: Re-enable or replace when there is more docstrings
      # - name: Check for missed docstrings
      #   run: bin/bb-missed-docstrings -i 'cli-options|-main' src
